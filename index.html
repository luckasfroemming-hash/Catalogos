<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Catálogo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --panel: #15151a;
    --border: #24242c;
    --text: #f0f0f3;
    --muted: #8a8a96;
    --accent: #f5b800;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(11,11,14,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .back-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px; border-radius: 8px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); }
  .back-btn.visible { display: flex; }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .breadcrumb { font-size: 13px; color: var(--muted); }
  .breadcrumb span.accent { color: var(--accent); font-weight: 500; }
  main { padding: 16px; max-width: 1400px; margin: 0 auto; }
  .stats { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  /* Grid de categorias */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .cat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .cat-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .cat-card .name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .cat-card .count {
    font-size: 12px;
    color: var(--muted);
  }

  /* Grid de álbuns */
  .album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .album-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }
  .album-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .album-card .cover {
    width: 100%;
    aspect-ratio: 1;
    background: #0a0a0d center/cover no-repeat;
    border-bottom: 1px solid var(--border);
  }
  .album-card .info {
    padding: 10px 12px;
  }
  .album-card .title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 34px;
  }
  .album-card .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Galeria de imagens */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .gallery img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    background: var(--panel);
    transition: transform 0.2s;
  }
  .gallery img:hover { transform: scale(1.02); }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .lightbox .close {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1);
    border: none; color: white;
    width: 44px; height: 44px; border-radius: 50%;
    font-size: 22px; cursor: pointer;
  }
  .lightbox .nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    border: none; color: white;
    width: 44px; height: 44px; border-radius: 50%;
    font-size: 22px; cursor: pointer;
  }
  .lightbox .nav.prev { left: 20px; }
  .lightbox .nav.next { right: 20px; }
  .lightbox .counter {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; color: white;
  }

  /* Loading / empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  /* Search */
  .search {
    margin-bottom: 16px;
  }
  .search input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  .search input:focus { border-color: var(--accent); }

  @media (max-width: 480px) {
    .cat-grid { grid-template-columns: repeat(2, 1fr); }
    .album-grid { grid-template-columns: repeat(2, 1fr); }
    .gallery { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <button class="back-btn" id="backBtn" aria-label="Voltar">←</button>
  <div>
    <h1>Catálogo</h1>
    <div class="breadcrumb" id="crumb">Todas as categorias</div>
  </div>
</header>

<main>
  <div class="search" id="searchBox" style="display:none;">
    <input type="text" id="searchInput" placeholder="Buscar modelo...">
  </div>
  <div class="stats" id="stats"></div>
  <div id="content"></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose">×</button>
  <button class="nav prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="nav next" id="lbNext">›</button>
  <div class="counter" id="lbCounter"></div>
</div>

<script>
let DATA = null;
let state = { view: 'categories', category: null, album: null };
let lbIndex = 0;
let lbImages = [];

const $ = id => document.getElementById(id);
const content = $('content');
const backBtn = $('backBtn');
const crumb = $('crumb');
const stats = $('stats');
const searchBox = $('searchBox');
const searchInput = $('searchInput');

async function loadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    DATA = await r.json();
    render();
  } catch (e) {
    content.innerHTML = '<div class="empty">Erro ao carregar catálogo. Aguarde o workflow terminar.</div>';
  }
}

function render() {
  if (state.view === 'categories') renderCategories();
  else if (state.view === 'albums') renderAlbums();
  else if (state.view === 'gallery') renderGallery();
  updateBackBtn();
}

function renderCategories() {
  crumb.textContent = 'Todas as categorias';
  searchBox.style.display = 'none';
  const cats = DATA.categorias || [];
  stats.textContent = `${cats.length} categorias · ${DATA.total_albuns || 0} modelos · ${DATA.total_imagens || 0} imagens`;
  if (!cats.length) {
    content.innerHTML = '<div class="empty">Catálogo vazio.</div>';
    return;
  }
  const html = `<div class="cat-grid">${cats.map(c => `
    <div class="cat-card" data-slug="${c.slug}">
      <div class="name">${escapeHtml(c.nome)}</div>
      <div class="count">${c.albuns.length} modelo${c.albuns.length !== 1 ? 's' : ''}</div>
    </div>`).join('')}</div>`;
  content.innerHTML = html;
  content.querySelectorAll('.cat-card').forEach(el => {
    el.onclick = () => openCategory(el.dataset.slug);
  });
}

function renderAlbums() {
  const cat = DATA.categorias.find(c => c.slug === state.category);
  if (!cat) { goHome(); return; }
  crumb.innerHTML = `<span class="accent">${escapeHtml(cat.nome)}</span>`;
  searchBox.style.display = 'block';
  stats.textContent = `${cat.albuns.length} modelos`;
  const q = (searchInput.value || '').toLowerCase().trim();
  const albums = q
    ? cat.albuns.filter(a => a.titulo.toLowerCase().includes(q))
    : cat.albuns;
  if (!albums.length) {
    content.innerHTML = '<div class="empty">Nenhum modelo encontrado.</div>';
    return;
  }
  const html = `<div class="album-grid">${albums.map(a => `
    <div class="album-card" data-id="${a.id}">
      <div class="cover" style="background-image:url('${escapeAttr(a.capa)}')"></div>
      <div class="info">
        <div class="title">${escapeHtml(a.titulo)}</div>
        <div class="meta">${a.imagens.length} foto${a.imagens.length !== 1 ? 's' : ''}</div>
      </div>
    </div>`).join('')}</div>`;
  content.innerHTML = html;
  content.querySelectorAll('.album-card').forEach(el => {
    el.onclick = () => openAlbum(el.dataset.id);
  });
}

function renderGallery() {
  const cat = DATA.categorias.find(c => c.slug === state.category);
  const alb = cat && cat.albuns.find(a => a.id === state.album);
  if (!alb) { goHome(); return; }
  crumb.innerHTML = `<span class="accent">${escapeHtml(cat.nome)}</span> › ${escapeHtml(alb.titulo)}`;
  searchBox.style.display = 'none';
  stats.textContent = `${alb.imagens.length} foto${alb.imagens.length !== 1 ? 's' : ''}`;
  lbImages = alb.imagens;
  const html = `<div class="gallery">${alb.imagens.map((src, i) => `
    <img src="${escapeAttr(src)}" loading="lazy" data-i="${i}" alt="">`).join('')}</div>`;
  content.innerHTML = html;
  content.querySelectorAll('img').forEach(img => {
    img.onclick = () => openLightbox(parseInt(img.dataset.i));
  });
}

function openCategory(slug) {
  state = { view: 'albums', category: slug, album: null };
  searchInput.value = '';
  window.scrollTo(0, 0);
  render();
}
function openAlbum(id) {
  state.view = 'gallery';
  state.album = id;
  window.scrollTo(0, 0);
  render();
}
function goBack() {
  if (state.view === 'gallery') { state.view = 'albums'; state.album = null; }
  else if (state.view === 'albums') goHome();
  render();
}
function goHome() {
  state = { view: 'categories', category: null, album: null };
  render();
}
function updateBackBtn() {
  backBtn.classList.toggle('visible', state.view !== 'categories');
}

// Lightbox
function openLightbox(i) {
  lbIndex = i;
  $('lbImg').src = lbImages[i];
  $('lbCounter').textContent = `${i+1} / ${lbImages.length}`;
  $('lightbox').classList.add('active');
}
function closeLightbox() { $('lightbox').classList.remove('active'); }
function lbNav(dir) {
  lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
  $('lbImg').src = lbImages[lbIndex];
  $('lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
}

// Escape
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// Events
backBtn.onclick = goBack;
$('lbClose').onclick = closeLightbox;
$('lbPrev').onclick = () => lbNav(-1);
$('lbNext').onclick = () => lbNav(1);
$('lightbox').onclick = e => { if (e.target.id === 'lightbox') closeLightbox(); };
document.addEventListener('keydown', e => {
  if (!$('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});
searchInput.addEventListener('input', () => {
  if (state.view === 'albums') renderAlbums();
});

loadData();
</script>
</body>
</html>
