<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
:root{--bg:#0c0c0c;--card:#141414;--bd:#242424;--acc:#e2ff5d;--txt:#efefef;--mut:#606060;--hv:#1c1c1c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh}
aside{width:252px;min-width:252px;background:var(--card);border-right:1px solid var(--bd);height:100vh;position:sticky;top:0;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
aside::-webkit-scrollbar{width:3px}
aside::-webkit-scrollbar-thumb{background:var(--bd)}
.logo{padding:20px 16px 14px;border-bottom:1px solid var(--bd)}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--acc);line-height:1}
.logo p{font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.srch{padding:10px 12px;border-bottom:1px solid var(--bd)}
.srch input{width:100%;background:#1a1a1a;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:12px;outline:none;transition:border-color .2s;font-family:inherit}
.srch input:focus{border-color:var(--acc)}
.srch input::placeholder{color:var(--mut)}
nav{flex:1;padding:6px 0 20px}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:9px 16px;background:none;border:none;border-bottom:1px solid #1a1a1a;color:var(--mut);font-family:inherit;font-size:11.5px;cursor:pointer;text-align:left;transition:background .12s,color .12s}
.nb.live{color:var(--txt)}
.nb:hover,.nb.active{background:var(--hv);color:var(--acc)}
.nb .badge{margin-left:auto;background:var(--acc);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
main{flex:1;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);padding:15px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.topbar span{font-size:11px;color:var(--mut);letter-spacing:1px}
.pc{flex:1;padding:28px}
.hero{background:linear-gradient(135deg,#141414,#1a1a1a 55%,#111);border:1px solid var(--bd);border-radius:12px;padding:48px 44px;margin-bottom:32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30%;right:-5%;width:320px;height:320px;background:radial-gradient(circle,rgba(226,255,93,.08),transparent 70%);pointer-events:none}
.hero h2{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:5px;line-height:1;margin-bottom:12px}
.hero h2 span{color:var(--acc)}
.hero p{font-size:13px;color:var(--mut);line-height:1.8;max-width:400px}
.hero-n{display:flex;gap:32px;margin-top:24px}
.hero-n .n{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--acc);line-height:1}
.hero-n .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.sec{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--mut);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.cc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px 14px;cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .15s}
.cc.live{border-color:#2a2a2a}
.cc:hover{background:var(--hv);border-color:#383838;transform:translateY(-2px)}
.cc .ic{font-size:26px;margin-bottom:8px}
.cc .nm{font-size:11.5px;font-weight:600;line-height:1.3}
.cc .inf{font-size:10px;color:var(--mut);margin-top:4px}
.cc .pill{display:inline-block;margin-top:6px;background:rgba(226,255,93,.12);color:var(--acc);border:1px solid rgba(226,255,93,.25);font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 7px;border-radius:4px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:14px}
.pd{background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
.pd:hover{transform:translateY(-3px);border-color:#3a3a3a;box-shadow:0 10px 32px rgba(0,0,0,.6)}
.pd img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#1a1a1a}
.pd .pi{padding:10px 12px 13px}
.pd .pt{font-size:12px;font-weight:500;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pd .ps{font-size:10px;color:var(--mut);margin-top:3px}
.pd .pp{font-size:10px;color:var(--acc);font-weight:600;margin-top:4px}
.empty{text-align:center;padding:64px 20px;color:var(--mut)}
.empty .ei{font-size:44px;margin-bottom:14px}
.empty p{font-size:13px;line-height:1.8}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center}
#lb.open{display:flex}
#lbx{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#lbx:hover{background:rgba(255,255,255,.2)}
#lbn{position:absolute;top:20px;left:20px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--acc)}
.lbw{display:flex;align-items:center;gap:8px;max-width:92vw;max-height:78vh}
#lbi{max-width:calc(92vw - 100px);max-height:78vh;object-fit:contain;border-radius:8px;display:block;transition:opacity .18s}
.la{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.la:hover{background:rgba(255,255,255,.2)}
.la:disabled{opacity:.15;cursor:default}
#lbt{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);color:#bbb;font-size:11px;letter-spacing:.8px;background:rgba(0,0,0,.7);padding:5px 16px;border-radius:20px;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
#lbs{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;max-width:90vw;overflow-x:auto;padding:3px;scrollbar-width:none}
#lbs::-webkit-scrollbar{display:none}
#lbs img{width:44px;height:44px;object-fit:cover;border-radius:4px;cursor:pointer;opacity:.4;transition:opacity .15s;flex-shrink:0;border:1px solid transparent}
#lbs img.on{opacity:1;border-color:var(--acc)}
#mob{display:none;position:fixed;bottom:18px;right:18px;width:48px;height:48px;background:var(--acc);color:#000;border:none;border-radius:50%;font-size:20px;cursor:pointer;z-index:999;box-shadow:0 4px 20px rgba(226,255,93,.3);align-items:center;justify-content:center}
@media(max-width:768px){aside{position:fixed;left:-252px;top:0;z-index:50;transition:left .28s}aside.open{left:0}#mob{display:flex}.pc{padding:16px}.hero{padding:28px 20px}.hero h2{font-size:38px}.topbar{padding:12px 16px}#lbi{max-width:calc(92vw - 72px);max-height:72vh}}
footer{padding:18px 28px;border-top:1px solid var(--bd);display:flex;justify-content:space-between}
footer p{font-size:10px;color:var(--mut);letter-spacing:1px}
</style>
</head>

var nav=document.getElementById('nav');
var hb=document.createElement('button');
hb.className='nb live active';hb.dataset.s='inicio';
hb.innerHTML='<span>🏠</span><span>Início</span>';
hb.onclick=function(){sa(hb);home()};
nav.appendChild(hb);

CATS.forEach(function(c){
  var n=PRODS.filter(function(p){return p.cat===c.name}).length;
  var b=document.createElement('button');
  b.className='nb'+(c.live?' live':'');b.dataset.s=c.name.toLowerCase();
  b.innerHTML='<span>'+c.icon+'</span><span>'+c.name+'</span>'+(c.live?'<span class="badge">'+n+'</span>':'');
  b.onclick=(function(cat,btn){return function(){sa(btn);cat.live?showCat(cat.name,cat.icon):null}})(c,b);
  nav.appendChild(b);
});

function sa(el){document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active')});el.classList.add('active')}

document.getElementById('si').addEventListener('input',function(){
  var q=this.value.toLowerCase();
  document.querySelectorAll('.nb').forEach(function(b){b.style.display=(!q||b.dataset.s.includes(q))?'':' none'});
});

function home(){
  document.getElementById('ttl').textContent='CATÁLOGO';
  document.getElementById('tsub').textContent='';
  var h='<div class="hero"><h2>PRODUTOS<br><span>PREMIUM</span></h2>'
   +'<p>Selecione uma categoria no menu. Clique num produto para ver todas as fotos.</p>'
   +'<div class="hero-n"><div><div class="n">'+PRODS.length+'</div><div class="l">Produtos</div></div>'
   +'<div><div class="n">3</div><div class="l">Categorias</div></div></div></div>'
   +'<p class="sec">CATEGORIAS</p><div class="cg" id="cg"></div>';
  document.getElementById('pc').innerHTML=h;
  var cg=document.getElementById('cg');
  CATS.forEach(function(c){
    var n=PRODS.filter(function(p){return p.cat===c.name}).length;
    var d=document.createElement('div');d.className='cc'+(c.live?' live':'');
    d.innerHTML='<div class="ic">'+c.icon+'</div><div class="nm">'+c.name+'</div>'
     +'<div class="inf">'+(c.live?n+' modelos':'em breve')+'</div>'
     +(c.live?'<div class="pill">DISPONÍVEL</div>':'');
    if(c.live)d.onclick=(function(n,i){return function(){showCat(n,i)}})(c.name,c.icon);
    cg.appendChild(d);
  });
}

function showCat(name,icon){
  var ps=PRODS.filter(function(p){return p.cat===name});
  document.getElementById('ttl').textContent=name.toUpperCase();
  document.getElementById('tsub').textContent=ps.length+' modelos';
  if(!ps.length){
    document.getElementById('pc').innerHTML='<div class="empty"><div class="ei">'+(icon||'📦')+'</div><p>'+name+'<br>Em breve.</p></div>';
    return;
  }
  document.getElementById('pc').innerHTML='<div class="pg" id="pg"></div>';
  var pg=document.getElementById('pg');
  ps.forEach(function(p){
    var d=document.createElement('div');d.className='pd';
    d.innerHTML='<img src="'+img(p.cover)+'" alt="'+p.title+'" loading="lazy" onerror="this.style.background=\'#222\'">'
     +'<div class="pi"><div class="pt">'+p.title+'</div><div class="ps">'+p.cat+'</div>'
     +(p.photos.length>1?'<div class="pp">📷 '+p.photos.length+' fotos</div>':'')+'</div>';
    d.onclick=(function(pr){return function(){openLB(pr)}})(p);
    pg.appendChild(d);
  });
}

var LB={photos:[],idx:0,title:''};
function openLB(p){LB.photos=p.photos;LB.idx=0;LB.title=p.title;document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';drawLB()}
function drawLB(){
  var i=document.getElementById('lbi');
  i.style.opacity='.3';i.src=img(LB.photos[LB.idx]);
  i.onload=function(){i.style.opacity='1'};
  i.onerror=function(){i.src=img(LB.photos[LB.idx],'small');i.style.opacity='1'};
  document.getElementById('lbn').textContent=(LB.idx+1)+' / '+LB.photos.length;
  document.getElementById('lbt').textContent=LB.title;
  document.getElementById('lbp').disabled=LB.idx===0;
  document.getElementById('lbnx').disabled=LB.idx===LB.photos.length-1;
  var s=document.getElementById('lbs');
  if(LB.photos.length>1){
    s.innerHTML=LB.photos.map(function(h,i){return'<img src="'+img(h,'small')+'" class="'+(i===LB.idx?'on':'')+'" onclick="gLB('+i+')" onerror="this.style.display=\'none\'">'}).join('');
    s.style.display='flex';
  }else s.style.display='none';
}
function gLB(i){LB.idx=i;drawLB()}
function closeLB(){document.getElementById('lb').classList.remove('open');document.body.style.overflow=''}
document.getElementById('lbx').onclick=closeLB;
document.getElementById('lbp').onclick=function(){if(LB.idx>0){LB.idx--;drawLB()}};
document.getElementById('lbnx').onclick=function(){if(LB.idx<LB.photos.length-1){LB.idx++;drawLB()}};
document.getElementById('lb').addEventListener('click',function(e){if(e.target===this)closeLB()});
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft'&&LB.idx>0){LB.idx--;drawLB()}
  if(e.key==='ArrowRight'&&LB.idx<LB.photos.length-1){LB.idx++;drawLB()}
});
var tx=0;
document.getElementById('lb').addEventListener('touchstart',function(e){tx=e.touches[0].clientX},{passive:true});
document.getElementById('lb').addEventListener('touchend',function(e){
  var d=e.changedTouches[0].clientX-tx;
  if(Math.abs(d)>50){if(d<0&&LB.idx<LB.photos.length-1){LB.idx++;drawLB()}else if(d>0&&LB.idx>0){LB.idx--;drawLB()}}
},{passive:true});
document.getElementById('mob').onclick=function(){document.getElementById('sb').classList.toggle('open')};
document.querySelector('main').addEventListener('click',function(){document.getElementById('sb').classList.remove('open')});
home();
</script>
</body>
</html>
