name: Build Catalog

on:
  workflow_dispatch:
  push:
    paths: ['build.py']
  schedule:
    - cron: '0 6 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Run catalog builder
        run: python3 build.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ index.html catalog.json style.css app.js || true
          git diff --cached --quiet || git commit -m "rebuild catalog [skip ci]"
          git push
