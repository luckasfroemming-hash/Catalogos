on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo: recategorize (reorganiza imagens já baixadas) ou full (baixa tudo)'
        required: true
        default: 'recategorize'
        type: choice
        options:
          - recategorize
          - full

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run recategorize
        if: ${{ github.event.inputs.mode == 'recategorize' }}
        run: python recategorize.py

      - name: Run full build
        if: ${{ github.event.inputs.mode == 'full' }}
        env:
          BATCH_SIZE: 300
        run: python build.py

      - name: Commit changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Sem mudanças"
          else
            git commit -m "Update catalog (${{ github.event.inputs.mode }})"
            git push
          fi
