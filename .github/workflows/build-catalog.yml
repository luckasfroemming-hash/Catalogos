name: Build Complete Catalog

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/build-catalog.yml']
  schedule:
    - cron: '0 6 * * 0'   # Atualiza todo domingo às 6h

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Scrape catalog, download images, generate site
        run: |
          python3 << 'PYEOF'
import urllib.request, urllib.error, re, json, time, os, sys

BASE    = 'https://ovosneaker.x.yupoo.com'
CDN     = 'https://photo.yupoo.com/ovosneaker/'
HEADERS = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
    'Referer'   : BASE + '/',
    'Accept'    : 'text/html,application/xhtml+xml,*/*;q=0.8',
    'Accept-Language': 'en-US,en;q=0.9',
}

# ── helpers ──────────────────────────────────────────────────────────────────

def fetch(url, retries=3):
    for attempt in range(retries):
        try:
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=25) as r:
                return r.read().decode('utf-8', errors='ignore')
        except Exception as e:
            if attempt == retries - 1:
                print(f'  FAIL {url}: {e}')
                return ''
            time.sleep(3 * (attempt + 1))
    return ''

def download_img(hash_, size='medium'):
    path = f'images/{hash_}.jpg'
    if os.path.exists(path):
        return True
    url = CDN + hash_ + '/' + size + '.jpg'
    try:
        req = urllib.request.Request(url, headers=HEADERS)
        with urllib.request.urlopen(req, timeout=20) as r:
            data = r.read()
        if len(data) > 2000:
            with open(path, 'wb') as f:
                f.write(data)
            return True
    except Exception:
        pass
    return False

BAD_WORDS = {'whatsapp','instagram','discord','wechat','telegram','groups',
             'spreadsheet','cssbuy','weidian','taobao'}

def clean_title(t):
    for w in BAD_WORDS:
        idx = t.lower().find(w)
        if idx > 0:
            t = t[:idx]
    t = re.sub(r'\+\d[\d\s\-]+', '', t)
    t = re.sub(r'【[^】]*】', '', t)
    t = re.sub(r'\s+', ' ', t)
    return t.strip()

def parse_albums(html, cat_name):
    """Extract albums with title + cover image from a category page."""
    albums = []
    seen   = set()

    # Yupoo renders: <a href=".../albums/ID..." title="TITLE">...<img src=".../HASH/medium.jpg">
    # We'll walk through by splitting on album hrefs
    link_re = re.compile(
        r'href="https://ovosneaker\.x\.yupoo\.com/albums/(\d+)[^"]*"[^>]*title="([^"]+)"'
    )
    img_re  = re.compile(r'/([a-f0-9]{8})/(?:medium|small)\.jpg')

    matches = list(link_re.finditer(html))
    for i, m in enumerate(matches):
        alb_id = m.group(1)
        title  = m.group(2)

        if alb_id in seen:
            continue
        if any(w in title.lower() for w in BAD_WORDS):
            continue
        seen.add(alb_id)

        # search for cover image in the text AFTER this link (up to next link)
        end_pos = matches[i+1].start() if i+1 < len(matches) else len(html)
        chunk   = html[m.start():end_pos]
        img_m   = img_re.search(chunk)
        if not img_m:
            continue

        cover = img_m.group(1)
        albums.append({
            'id'    : alb_id,
            'title' : clean_title(title),
            'cover' : cover,
            'cat'   : cat_name,
            'photos': [cover],
        })

    return albums

def get_cat_name(html):
    # <title>Cat Name | 分类 | ...</title>
    m = re.search(r'<title>([^<|]+)', html)
    if not m:
        return ''
    name = m.group(1).strip()
    name = re.sub(r'whatsapp[\s\S]*', '', name, flags=re.I)
    name = re.sub(r'(分类|ovosneaker|Supplier|Catalog|\|).*', '', name, flags=re.I)
    name = re.sub(r'【[^】]*】', '', name)
    return name.strip(' |-·') or ''

# ── Step 1: collect all category IDs from the main page ───────────────────────

print('── Step 1: fetching main page ──')
main_html = fetch(BASE + '/albums')
if not main_html:
    sys.exit('Could not fetch main page')

# subcategory IDs (isSubCate=true) tend to have the actual products
sub_ids = list(dict.fromkeys(re.findall(
    r'/categories/(\d+)\?isSubCate=true', main_html
)))
# top-level category IDs
top_ids = list(dict.fromkeys(re.findall(
    r'/categories/(\d+)"', main_html
)))

# combine: subcats first (they're most specific), then top-level
all_cat_ids = list(dict.fromkeys(sub_ids + top_ids))
print(f'Found {len(sub_ids)} subcategories + {len(top_ids)} top-level = {len(all_cat_ids)} total')

# ── Step 2: fetch each category page and collect albums ───────────────────────

print('\n── Step 2: scraping categories ──')
all_albums  = []
seen_albums = set()
os.makedirs('images', exist_ok=True)

for i, cat_id in enumerate(all_cat_ids):
    is_sub = cat_id in sub_ids
    url    = f'{BASE}/categories/{cat_id}' + ('?isSubCate=true' if is_sub else '')
    print(f'[{i+1}/{len(all_cat_ids)}] cat {cat_id}', end=' ')

    html = fetch(url)
    if not html:
        print('– skip')
        continue

    cat_name = get_cat_name(html) or f'Cat {cat_id}'
    albums   = parse_albums(html, cat_name)

    new = 0
    for a in albums:
        if a['id'] not in seen_albums:
            seen_albums.add(a['id'])
            all_albums.append(a)
            new += 1

    print(f'→ {new} new albums in "{cat_name}" (total {len(all_albums)})')
    time.sleep(0.5)

print(f'\n✅ Total albums: {len(all_albums)}')

# ── Step 3: download cover images ────────────────────────────────────────────

print('\n── Step 3: downloading cover images ──')
ok_count = 0
for i, alb in enumerate(all_albums):
    result = download_img(alb['cover'])
    if result:
        ok_count += 1
        print(f'[{i+1}/{len(all_albums)}] ✓ {alb["cover"]}')
    else:
        print(f'[{i+1}/{len(all_albums)}] ✗ {alb["cover"]} ({alb["title"][:40]})')
    time.sleep(0.18)

print(f'\n✅ Downloaded {ok_count}/{len(all_albums)} images')

# ── Step 4: generate index.html ───────────────────────────────────────────────

print('\n── Step 4: generating index.html ──')

# Build category list (unique, preserving order)
cats_seen = []
cats_order = []
for a in all_albums:
    if a['cat'] not in cats_seen:
        cats_seen.append(a['cat'])
        cats_order.append(a['cat'])

products_js = json.dumps(all_albums, ensure_ascii=False)
cats_js     = json.dumps(cats_order, ensure_ascii=False)

html_out = f'''<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
:root{{--bg:#0c0c0c;--card:#141414;--bd:#242424;--acc:#e2ff5d;--txt:#efefef;--mut:#606060;--hv:#1c1c1c}}
*{{box-sizing:border-box;margin:0;padding:0}}
body{{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh}}
aside{{width:256px;min-width:256px;background:var(--card);border-right:1px solid var(--bd);height:100vh;position:sticky;top:0;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}}
aside::-webkit-scrollbar{{width:3px}}aside::-webkit-scrollbar-thumb{{background:var(--bd)}}
.logo{{padding:20px 16px 14px;border-bottom:1px solid var(--bd)}}
.logo h1{{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--acc);line-height:1}}
.logo p{{font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-top:4px}}
.srch{{padding:10px 12px;border-bottom:1px solid var(--bd)}}
.srch input{{width:100%;background:#1a1a1a;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:12px;outline:none;transition:border-color .2s;font-family:inherit}}
.srch input:focus{{border-color:var(--acc)}}
.srch input::placeholder{{color:var(--mut)}}
nav{{flex:1;padding:6px 0 20px}}
.nb{{display:flex;align-items:center;gap:9px;width:100%;padding:9px 16px;background:none;border:none;border-bottom:1px solid #1a1a1a;color:var(--txt);font-family:inherit;font-size:11.5px;cursor:pointer;text-align:left;transition:background .12s,color .12s}}
.nb:hover,.nb.active{{background:var(--hv);color:var(--acc)}}
.nb .cnt{{margin-left:auto;background:var(--acc);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}}
main{{flex:1;display:flex;flex-direction:column}}
.topbar{{background:var(--card);border-bottom:1px solid var(--bd);padding:15px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}}
.topbar h2{{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}}
.topbar span{{font-size:11px;color:var(--mut);letter-spacing:1px}}
.pc{{flex:1;padding:28px}}
.hero{{background:linear-gradient(135deg,#141414,#1a1a1a 55%,#111);border:1px solid var(--bd);border-radius:12px;padding:48px 44px;margin-bottom:32px;position:relative;overflow:hidden}}
.hero::before{{content:'';position:absolute;top:-30%;right:-5%;width:320px;height:320px;background:radial-gradient(circle,rgba(226,255,93,.08),transparent 70%);pointer-events:none}}
.hero h2{{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:5px;line-height:1;margin-bottom:12px}}
.hero h2 span{{color:var(--acc)}}
.hero p{{font-size:13px;color:var(--mut);line-height:1.8;max-width:400px}}
.hero-n{{display:flex;gap:32px;margin-top:24px}}
.hero-n .n{{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--acc);line-height:1}}
.hero-n .l{{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:2px;margin-top:3px}}
.sec{{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--mut);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd)}}
.pg{{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:14px}}
.pd{{background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}}
.pd:hover{{transform:translateY(-3px);border-color:#3a3a3a;box-shadow:0 10px 32px rgba(0,0,0,.6)}}
.pd img{{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#1a1a1a}}
.pd .pi{{padding:10px 12px 13px}}
.pd .pt{{font-size:12px;font-weight:500;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}}
.pd .ps{{font-size:10px;color:var(--mut);margin-top:3px}}
.empty{{text-align:center;padding:64px 20px;color:var(--mut)}}
.empty .ei{{font-size:44px;margin-bottom:14px}}
.empty p{{font-size:13px;line-height:1.8}}
#lb{{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center}}
#lb.open{{display:flex}}
#lbx{{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}}
#lbx:hover{{background:rgba(255,255,255,.2)}}
#lbn{{position:absolute;top:20px;left:20px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--acc)}}
.lbw{{display:flex;align-items:center;gap:8px;max-width:92vw;max-height:78vh}}
#lbi{{max-width:calc(92vw - 100px);max-height:78vh;object-fit:contain;border-radius:8px;display:block;transition:opacity .18s}}
.la{{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}}
.la:hover{{background:rgba(255,255,255,.2)}}
.la:disabled{{opacity:.15;cursor:default}}
#lbt{{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);color:#bbb;font-size:11px;background:rgba(0,0,0,.7);padding:5px 16px;border-radius:20px;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}}
#lbs{{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;max-width:90vw;overflow-x:auto;padding:3px;scrollbar-width:none}}
#lbs::-webkit-scrollbar{{display:none}}
#lbs img{{width:44px;height:44px;object-fit:cover;border-radius:4px;cursor:pointer;opacity:.4;transition:opacity .15s;flex-shrink:0;border:1px solid transparent}}
#lbs img.on{{opacity:1;border-color:var(--acc)}}
#mob{{display:none;position:fixed;bottom:18px;right:18px;width:48px;height:48px;background:var(--acc);color:#000;border:none;border-radius:50%;font-size:20px;cursor:pointer;z-index:999;box-shadow:0 4px 20px rgba(226,255,93,.3);align-items:center;justify-content:center}}
@media(max-width:768px){{aside{{position:fixed;left:-256px;top:0;z-index:50;transition:left .28s}}aside.open{{left:0}}#mob{{display:flex}}.pc{{padding:16px}}.hero{{padding:28px 20px}}.hero h2{{font-size:38px}}.topbar{{padding:12px 16px}}#lbi{{max-width:calc(92vw - 72px);max-height:72vh}}}}
footer{{padding:18px 28px;border-top:1px solid var(--bd);display:flex;justify-content:space-between}}
footer p{{font-size:10px;color:var(--mut);letter-spacing:1px}}
</style>
</head>
<body>
<aside id="sb">
  <div class="logo"><h1>CATÁLOGO</h1><p>Produtos Premium</p></div>
  <div class="srch"><input id="si" type="text" placeholder="🔍  Buscar..." autocomplete="off"></div>
  <nav id="nav"></nav>
</aside>
<main>
  <div class="topbar"><h2 id="ttl">CATÁLOGO</h2><span id="tsub"></span></div>
  <div class="pc" id="pc"></div>
  <footer><p>CATÁLOGO COMPLETO</p><p id="yr"></p></footer>
</main>
<div id="lb">
  <button id="lbx">✕</button>
  <div id="lbn"></div>
  <div class="lbw">
    <button class="la" id="lbp">‹</button>
    <img id="lbi" src="" alt="">
    <button class="la" id="lbnx">›</button>
  </div>
  <div id="lbs"></div>
  <div id="lbt"></div>
</div>
<button id="mob">☰</button>
<script>
document.getElementById('yr').textContent=new Date().getFullYear();
var PRODS={products_js};
var CATS={cats_js};

// Imagem local (baixada pelo GitHub Action)
function img(h){{return'./images/'+h+'.jpg'}}
// Fallback via proxy caso a imagem local não exista
function imgProxy(h){{return'https://wsrv.nl/?url=photo.yupoo.com/ovosneaker/'+h+'/medium.jpg'}}

// ── SIDEBAR ──
var nav=document.getElementById('nav');
function mkBtn(label,onclick,count){{
  var b=document.createElement('button');
  b.className='nb';b.dataset.s=label.toLowerCase();
  b.innerHTML='<span>'+label+'</span>'+(count?'<span class="cnt">'+count+'</span>':'');
  b.onclick=onclick;return b;
}}
var hb=mkBtn('🏠 Início',function(){{sa(hb);home()}});
hb.classList.add('active');nav.appendChild(hb);
CATS.forEach(function(c){{
  var n=PRODS.filter(function(p){{return p.cat===c}}).length;
  var b=mkBtn(c,function(){{sa(b);showCat(c)}},n);
  nav.appendChild(b);
}});
function sa(el){{document.querySelectorAll('.nb').forEach(function(b){{b.classList.remove('active')}});el.classList.add('active')}}
document.getElementById('si').addEventListener('input',function(){{
  var q=this.value.toLowerCase();
  document.querySelectorAll('.nb').forEach(function(b){{b.style.display=(!q||b.dataset.s.includes(q))?'':'none'}});
}});

// ── HOME ──
function home(){{
  document.getElementById('ttl').textContent='CATÁLOGO';
  document.getElementById('tsub').textContent=PRODS.length+' produtos';
  var h='<div class="hero"><h2>PRODUTOS<br><span>PREMIUM</span></h2>'
    +'<p>Selecione uma categoria no menu lateral. Clique num produto para ver as fotos em tela cheia.</p>'
    +'<div class="hero-n">'
    +'<div><div class="n">'+PRODS.length+'</div><div class="l">Produtos</div></div>'
    +'<div><div class="n">'+CATS.length+'</div><div class="l">Categorias</div></div>'
    +'</div></div>'
    +'<p class="sec">CATEGORIAS</p>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px" id="cg"></div>';
  document.getElementById('pc').innerHTML=h;
  var cg=document.getElementById('cg');
  CATS.forEach(function(c){{
    var n=PRODS.filter(function(p){{return p.cat===c}}).length;
    var d=document.createElement('div');
    d.style.cssText='background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:16px;cursor:pointer;transition:background .15s,transform .15s;text-align:center';
    d.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+c+'</div><div style="font-size:10px;color:var(--mut)">'+n+' modelos</div>';
    d.onmouseover=function(){{this.style.background='var(--hv)';this.style.transform='translateY(-2px)'}};
    d.onmouseout=function(){{this.style.background='var(--card)';this.style.transform=''}};
    d.onclick=function(){{showCat(c)}};
    cg.appendChild(d);
  }});
}}

// ── CATEGORY ──
function showCat(name){{
  var ps=PRODS.filter(function(p){{return p.cat===name}});
  document.getElementById('ttl').textContent=name.toUpperCase();
  document.getElementById('tsub').textContent=ps.length+' modelos';
  if(!ps.length){{
    document.getElementById('pc').innerHTML='<div class="empty"><div class="ei">📦</div><p>Sem produtos.</p></div>';
    return;
  }}
  document.getElementById('pc').innerHTML='<div class="pg" id="pg"></div>';
  var pg=document.getElementById('pg');
  ps.forEach(function(p){{
    var d=document.createElement('div');d.className='pd';
    var src=img(p.cover);
    d.innerHTML='<img src="'+src+'" alt="'+p.title+'" loading="lazy" onerror="this.src=\''+imgProxy(p.cover)+'\';this.onerror=null">'
      +'<div class="pi"><div class="pt">'+p.title+'</div><div class="ps">'+p.cat+'</div></div>';
    d.onclick=(function(pr){{return function(){{openLB(pr)}}}})(p);
    pg.appendChild(d);
  }});
}}

// ── LIGHTBOX ──
var LB={{photos:[],idx:0,title:'',albId:''}};
function openLB(p){{
  LB.photos=p.photos||[p.cover];LB.idx=0;LB.title=p.title;LB.albId=p.id;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
  drawLB();
  // Load all album photos in background
  loadAlbumPhotos(p.id,p.cover);
}}
function loadAlbumPhotos(albId,cover){{
  var proxy='https://api.allorigins.win/get?url='+encodeURIComponent('https://ovosneaker.x.yupoo.com/albums/'+albId+'?uid=1');
  fetch(proxy).then(function(r){{return r.json()}}).then(function(d){{
    var html=d.contents||'';
    var hashes=[];var seen={{}};
    var re=/photo\.yupoo\.com\/[^/]+\/([a-f0-9]{{8}})\/(?:medium|small)\.jpg/g;
    var m;
    while((m=re.exec(html))!==null){{if(!seen[m[1]]){{seen[m[1]]=1;hashes.push(m[1]);}}}}
    if(hashes.length>1&&LB.albId===albId){{LB.photos=hashes;drawLB();}}
  }}).catch(function(){{}});
}}
function drawLB(){{
  var iEl=document.getElementById('lbi');
  iEl.style.opacity='.3';
  var h=LB.photos[LB.idx];
  iEl.src=img(h);
  iEl.onerror=function(){{this.src=imgProxy(h);this.onerror=null}};
  iEl.onload=function(){{iEl.style.opacity='1'}};
  document.getElementById('lbn').textContent=(LB.idx+1)+' / '+LB.photos.length;
  document.getElementById('lbt').textContent=LB.title;
  document.getElementById('lbp').disabled=LB.idx===0;
  document.getElementById('lbnx').disabled=LB.idx===LB.photos.length-1;
  var s=document.getElementById('lbs');
  if(LB.photos.length>1){{
    s.innerHTML=LB.photos.map(function(h,i){{
      var src=img(h);
      return'<img src="'+src+'" class="'+(i===LB.idx?'on':'')+'" onclick="gLB('+i+')" onerror="this.src=\''+imgProxy(h)+'\';this.onerror=null">';
    }}).join('');
    s.style.display='flex';
  }}else{{s.style.display='none'}}
}}
function gLB(i){{LB.idx=i;drawLB()}}
function closeLB(){{document.getElementById('lb').classList.remove('open');document.body.style.overflow=''}}
document.getElementById('lbx').onclick=closeLB;
document.getElementById('lbp').onclick=function(){{if(LB.idx>0){{LB.idx--;drawLB()}}}};
document.getElementById('lbnx').onclick=function(){{if(LB.idx<LB.photos.length-1){{LB.idx++;drawLB()}}}};
document.getElementById('lb').addEventListener('click',function(e){{if(e.target===this)closeLB()}});
document.addEventListener('keydown',function(e){{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft'&&LB.idx>0){{LB.idx--;drawLB()}}
  if(e.key==='ArrowRight'&&LB.idx<LB.photos.length-1){{LB.idx++;drawLB()}}
}});
var tx=0;
document.getElementById('lb').addEventListener('touchstart',function(e){{tx=e.touches[0].clientX}},{{passive:true}});
